<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>गुढी पाडवा — Gudi Padwa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:'Lora',serif;}

body{
  background:linear-gradient(180deg,
    #FFF9E6 0%,#FFF0C0 8%,#FFE080 18%,
    #FECF55 30%,#FDB827 44%,#F9A21A 58%,
    #F47B20 72%,#E85C14 84%,#C8410A 100%);
}

canvas{position:fixed;inset:0;pointer-events:none;}

/* BACK BUTTON */
.back-btn{
  position:fixed;top:22px;left:22px;z-index:25;
  display:none;
  padding:.55rem 1.4rem;border-radius:999px;
  border:1.5px solid rgba(180,80,0,.45);
  background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,240,200,.95));
  color:#8B3000;font-family:'Lora',serif;font-size:.88rem;
  cursor:pointer;letter-spacing:.06em;
  box-shadow:0 4px 20px rgba(160,60,0,.22);
  backdrop-filter:blur(10px);
  transition:all .28s;
  animation:backBtnIn .5s cubic-bezier(.23,1,.32,1);
}
.back-btn:hover{
  background:linear-gradient(135deg,rgba(240,120,20,.85),rgba(200,80,0,.9));
  border-color:rgba(240,140,20,.9);color:#fff;
  transform:translateX(-3px);
  box-shadow:0 6px 28px rgba(200,80,0,.38);
}
.back-btn.visible{display:block;}
@keyframes backBtnIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
#bgCanvas{z-index:0;}
#petalCanvas{z-index:5;}
#fwCanvas{z-index:10;}

/* sparkles */
.sparkle{position:fixed;border-radius:50%;background:radial-gradient(circle,#fff 30%,rgba(255,220,80,.3));animation:sparkleAnim 2.5s ease-in-out infinite alternate;pointer-events:none;}
@keyframes sparkleAnim{from{opacity:.12;transform:scale(.5)}to{opacity:.8;transform:scale(1.4)}}

/* skyline */
.skyline{position:fixed;bottom:13.5vh;left:0;right:0;z-index:3;pointer-events:none;}

/* ground */
.ground{position:fixed;bottom:0;left:0;right:0;z-index:4;height:14vh;
  background:linear-gradient(#7B3A10,#4A1A00);}
.grass{position:fixed;bottom:13vh;left:0;right:0;z-index:4;height:28px;}
.grass svg{width:100%;height:100%;}

/* rangoli */
#rangoliC{
  position:fixed;bottom:13.5vh;left:50%;transform:translateX(-50%);
  z-index:6;cursor:pointer;opacity:0;
  animation:fadeIn 1s 4s forwards;
  filter:drop-shadow(0 4px 18px rgba(180,60,0,.3));
}
@keyframes fadeIn{to{opacity:1}}

/* top garland */
.top-garland{
  position:fixed;top:0;left:0;right:0;z-index:8;
  display:flex;justify-content:center;
  pointer-events:none;opacity:0;animation:fadeIn 1s 3.8s forwards;
}
.g-row{display:flex;align-items:flex-end;padding-bottom:4px;}
.gfl{display:inline-block;font-size:1.5rem;line-height:1;animation:gfSway 3s ease-in-out infinite alternate;}
@keyframes gfSway{from{transform:rotate(-5deg)}to{transform:rotate(5deg)}}
.gstr{display:inline-block;width:5px;height:2px;background:linear-gradient(90deg,#C06800,#FFD700,#C06800);border-radius:2px;margin:0 1px;align-self:center;margin-bottom:8px;}

/* SCENE */
.scene{
  position:relative;z-index:7;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  padding:1rem 1rem 12vh;
  gap:.5rem;
  pointer-events:none;
}
.scene>*{pointer-events:all;}

/* GUDI IMAGE */
.gudi-wrap{
  position:relative;display:flex;flex-direction:column;align-items:center;
  opacity:0;transform:translateY(70px);
  animation:gudiUp 1.4s cubic-bezier(.23,1,.32,1) .8s forwards;
  cursor:pointer;
  margin-top:6vh;
}
@keyframes gudiUp{to{opacity:1;transform:translateY(0)}}
.gudi-sway{
  animation:sway 4s ease-in-out 2.8s infinite;
  transform-origin:bottom center;
}
@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.gudi-img{
  width:clamp(260px,48vw,420px);height:auto;
  filter:drop-shadow(0 8px 28px rgba(120,40,0,.35))
         drop-shadow(0 0 40px rgba(255,200,0,.28));
}

/* GREETING */
.greeting{
  text-align:center;
  opacity:0;
  animation:fadeUp .9s 2.3s cubic-bezier(.23,1,.32,1) forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ════ DANCING LETTERS — FULLY INTACT ════ */
.deva-letter{
  display:inline-block;
  opacity:0;
  transform-origin:bottom center;
  animation:
    letterEntrance 0.9s cubic-bezier(.23,1,.32,1) forwards,
    letterBounce   0.55s ease-in-out infinite alternate;
  animation-fill-mode: forwards, none;
}
.deva-letter.alive{
  opacity:1;
  animation: letterBounce 0.55s ease-in-out infinite alternate;
}

@keyframes letterEntrance{
  0%  {opacity:0; transform:translateY(-150px) rotate(-35deg) scale(0.2);}
  40% {opacity:1; transform:translateY(25px) rotate(12deg) scale(1.25);}
  60% {transform:translateY(-15px) rotate(-7deg) scale(0.95);}
  78% {transform:translateY(10px) rotate(4deg) scale(1.06);}
  90% {transform:translateY(-5px) rotate(-2deg) scale(0.98);}
  100%{opacity:1; transform:translateY(0px) rotate(0deg) scale(1);}
}

@keyframes letterBounce{
  0%   {transform:translateY(0px)    rotate(0deg);}
  10%  {transform:translateY(-12px)  rotate(1deg);}
  20%  {transform:translateY(-38px)  rotate(2deg);}
  30%  {transform:translateY(-55px)  rotate(1.5deg);}
  40%  {transform:translateY(-48px)  rotate(0deg);}
  50%  {transform:translateY(-28px)  rotate(-1deg);}
  60%  {transform:translateY(-8px)   rotate(-2deg);}
  70%  {transform:translateY(4px)    rotate(-1deg);}
  80%  {transform:translateY(2px)    rotate(0deg);}
  90%  {transform:translateY(-4px)   rotate(1deg);}
  100% {transform:translateY(0px)    rotate(0deg);}
}

.om{
  font-family:'Noto Serif Devanagari',serif;
  font-size:clamp(1.8rem,5vw,3rem);
  color:#8B2800;
  text-shadow:0 0 22px rgba(255,160,0,.65),0 0 44px rgba(255,100,0,.25);
  display:block;animation:omPulse 3s ease-in-out infinite;
}
@keyframes omPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.deva{
  font-family:'Noto Serif Devanagari',serif;
  font-size:clamp(2.8rem,9vw,5.5rem);
  font-weight:700;
  background:linear-gradient(180deg,#6B1800 0%,#A83000 22%,#D95010 50%,#F07820 75%,#FFBA40 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 10px rgba(140,50,0,.35));
  line-height:1.05;letter-spacing:.05em;
}
.eng{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(.78rem,2.5vw,1.5rem);
  color:#6B2400;letter-spacing:.2em;
  text-shadow:0 1px 6px rgba(255,180,60,.3);margin-top:.2rem;
}
.divdr{display:flex;align-items:center;gap:.8rem;margin:.5rem auto;width:fit-content;}
.dl{height:1.5px;width:60px;background:linear-gradient(90deg,transparent,#C85C00);}
.dr{height:1.5px;width:60px;background:linear-gradient(90deg,#C85C00,transparent);}
.sub{font-style:italic;color:#5A1E00;font-size:clamp(.75rem,2vw,.95rem);letter-spacing:.07em;}

/* WISH CARD */
.card{
  background:linear-gradient(135deg,rgba(255,250,225,.88),rgba(255,238,190,.92));
  border:1.5px solid rgba(190,90,0,.28);
  backdrop-filter:blur(18px);border-radius:22px;
  padding:.9rem 1.5rem;max-width:380px;width:100%;text-align:center;
  box-shadow:0 8px 40px rgba(160,60,0,.16),inset 0 1px 0 rgba(255,255,255,.75);
  opacity:0;animation:fadeUp .9s 3s forwards;
}
.wt{color:#4A1800;font-size:.88rem;line-height:1.78;}
.wd{font-family:'Noto Serif Devanagari',serif;color:#7A2E00;font-size:.84rem;margin-top:.5rem;line-height:1.7;}
.wf{color:#A05000;font-size:.73rem;margin-top:.5rem;letter-spacing:.12em;}

/* BUTTONS */
.btns{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .9s 3.8s forwards;}
.btn-c{
  position:relative;overflow:hidden;
  padding:.85rem 2.2rem;border-radius:999px;border:none;
  cursor:pointer;font-family:'Lora',serif;font-size:.92rem;font-weight:600;
  background:linear-gradient(135deg,#C83800,#E86800,#C83800);
  background-size:200% 100%;color:#fff;letter-spacing:.06em;
  box-shadow:0 6px 28px rgba(180,60,0,.42),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .25s,box-shadow .25s;
  animation:btnPulse 2.5s ease-in-out 4.5s infinite;
}
.btn-c::before{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.38),transparent);
  transform:skewX(-20deg);animation:shine 2.8s ease-in-out infinite;
}
@keyframes shine{0%{left:-60%}60%{left:130%}100%{left:130%}}
@keyframes btnPulse{
  0%,100%{box-shadow:0 6px 28px rgba(180,60,0,.42)}
  50%{box-shadow:0 6px 50px rgba(240,160,0,.78),0 0 0 8px rgba(240,160,0,.14)}
}
.btn-c:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 12px 40px rgba(220,100,0,.58);}
.btn-c:active{transform:scale(.97);}

.btn-w{
  padding:.85rem 2rem;border-radius:999px;
  border:1.5px solid rgba(160,70,0,.38);cursor:pointer;
  font-family:'Lora',serif;font-size:.9rem;
  background:rgba(255,238,190,.65);color:#5A2000;
  backdrop-filter:blur(10px);transition:all .28s;
}
.btn-w:hover{background:rgba(255,210,100,.58);transform:translateY(-3px);box-shadow:0 8px 28px rgba(180,100,0,.28);}

/* TOAST */
.toast{
  position:fixed;top:22px;left:50%;
  transform:translateX(-50%) translateY(-90px);
  z-index:20;
  background:linear-gradient(135deg,rgba(255,252,230,.97),rgba(255,242,195,.98));
  border:1.5px solid rgba(190,90,0,.35);border-radius:18px;
  padding:.6rem 1.8rem;color:#7A2800;font-family:'Lora',serif;
  font-size:.88rem;letter-spacing:.06em;text-align:center;
  transition:transform .5s cubic-bezier(.23,1,.32,1);
  pointer-events:none;
  box-shadow:0 8px 40px rgba(160,60,0,.18),inset 0 1px 0 rgba(255,255,255,.8);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* screen flash */
.flash{position:fixed;inset:0;z-index:9;background:rgba(255,220,80,.28);pointer-events:none;opacity:0;transition:opacity .15s;}
.flash.on{opacity:1;}

/* CELEBRATE TEXT OVERLAY */
.celeb-overlay{
  position:fixed;inset:0;z-index:15;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  opacity:0;transition:opacity .4s;
  background:radial-gradient(ellipse at center,
    rgba(120,20,0,.82) 0%,
    rgba(80,10,0,.90) 50%,
    rgba(40,5,0,.96) 100%);
}
.celeb-overlay.show{opacity:1;}
.celeb-text-wrap{
  display:flex;gap:0;justify-content:center;flex-wrap:wrap;
  filter:drop-shadow(0 0 40px rgba(255,200,0,1)) drop-shadow(0 0 80px rgba(255,120,0,.75));
}
.celeb-letter{
  display:inline-block;
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(3rem,11vw,7.5rem);
  letter-spacing:.08em;
  font-weight:700;
  background:linear-gradient(180deg,
    #FFF8C0 0%,
    #FFE040 18%,
    #FF9500 42%,
    #FF4500 68%,
    #FFD700 85%,
    #FFF8C0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:0;
  transform-origin:bottom center;
  text-shadow:none;
}
.celeb-letter.pop{
  animation: celebPop 0.6s cubic-bezier(.23,1,.32,1) forwards,
             celebDance 0.5s ease-in-out infinite alternate;
}
@keyframes celebPop{
  0%  {opacity:0;transform:scale(0) rotate(-30deg);}
  50% {opacity:1;transform:scale(1.4) rotate(10deg);}
  75% {transform:scale(0.9) rotate(-5deg);}
  100%{opacity:1;transform:scale(1) rotate(0deg);}
}
@keyframes celebDance{
  0%   {transform:translateY(0px);}
  10%  {transform:translateY(-15px);}
  20%  {transform:translateY(-45px);}
  30%  {transform:translateY(-65px);}
  40%  {transform:translateY(-55px);}
  50%  {transform:translateY(-32px);}
  60%  {transform:translateY(-10px);}
  70%  {transform:translateY(5px);}
  80%  {transform:translateY(3px);}
  90%  {transform:translateY(-6px);}
  100% {transform:translateY(0px);}
}
.celeb-sub{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,3.5vw,2rem);
  color:#FFD700;
  letter-spacing:.25em;
  text-shadow:0 0 18px rgba(255,200,0,.95),0 0 45px rgba(255,120,0,.6);
  opacity:0;
  transform:translateY(20px);
  transition:opacity .6s .8s, transform .6s .8s;
  margin-top:.5rem;
}
.celeb-overlay.show .celeb-sub{opacity:1;transform:translateY(0);}

@media(max-width:480px){.card{padding:1rem 1.1rem;}}
</style>
</head>
<body>

<canvas id="petalCanvas"></canvas>
<canvas id="fwCanvas"></canvas>
<div class="flash" id="flash"></div>
<div id="sparklesWrap"></div>

</div>

<!-- GROUND + GRASS -->

<div class="grass">
  <svg viewBox="0 0 1440 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="28">
    <path d="M0,24 Q360,0 720,18 Q1080,0 1440,24 L1440,28 L0,28Z" fill="#4CAF50"/>
    <path d="M0,28 Q240,10 480,22 Q720,8 960,22 Q1200,8 1440,28" fill="#66BB6A" opacity=".6"/>
  </svg>

<!-- RANGOLI -->

<!-- TOP GARLAND -->
<div class="top-garland"><div class="g-row" id="garlandRow"></div></div>

<!-- SCENE -->
<div class="scene">

  <!-- GUDI IMAGE -->

<script>

/* DANCING LETTER TITLE */
(function(){
  const el = document.getElementById('devaTitle');
  const text = 'Gudi Padwa';
  const chars = [...text];
  let entranceDelay = 2.4;
  const spans = [];

  chars.forEach((ch, i) => {
    if(ch === ' '){
      const sp = document.createElement('span');
      sp.style.cssText = 'display:inline-block;width:0.3em;';
      el.appendChild(sp);
      entranceDelay += 0.05;
      return;
    }
    const span = document.createElement('span');
    span.className = 'deva-letter';
    span.textContent = ch;
    span.style.animationName = 'letterEntrance';
    span.style.animationDuration = '0.9s';
    span.style.animationTimingFunction = 'cubic-bezier(.23,1,.32,1)';
    span.style.animationDelay = entranceDelay + 's';
    span.style.animationFillMode = 'forwards';
    el.appendChild(span);
    spans.push({span, entranceDelay, idx: spans.length});
    entranceDelay += 0.12;
  });

  spans.forEach(({span, entranceDelay, idx}) => {
    const totalEntrance = (entranceDelay + 0.9) * 1000;
    setTimeout(() => {
      span.style.opacity = '1';
      span.style.animationName = 'letterBounce';
      span.style.animationDuration = '1.4s';
      span.style.animationTimingFunction = 'ease-in-out';
      span.style.animationDelay = (idx * 0.18) + 's';
      span.style.animationIterationCount = 'infinite';
      span.style.animationDirection = 'normal';
      span.style.animationFillMode = 'none';
    }, totalEntrance);
  });
})();

/* BACK BUTTON */
const backBtn = document.getElementById('backBtn');
backBtn.addEventListener('click', () => {
  fwRunning = false;
  celebLock = false;
  fwPts = [];
  setTimeout(() => fwCtx.clearRect(0, 0, fwC.width, fwC.height), 400);
  backBtn.classList.remove('visible');
  hideCelebOverlay();
  // Resume dancing letters
  document.querySelectorAll('.deva-letter').forEach(s=>s.style.animationPlayState='running');
  showToast('🌸 Welcome back!');
});

/* CELEBRATE OVERLAY TEXT */
const celebOverlay = document.getElementById('celebOverlay');
const celebTextWrap = document.getElementById('celebTextWrap');

function buildCelebText(){
  celebTextWrap.innerHTML = '';
  const text = 'Gudi Padwa';
  const chars = [...text];
  chars.forEach((ch, i) => {
    if(ch === ' '){
      const sp = document.createElement('span');
      sp.style.cssText='display:inline-block;width:0.25em;';
      celebTextWrap.appendChild(sp);
      return;
    }
    const span = document.createElement('span');
    span.className = 'celeb-letter';
    span.textContent = ch;
    celebTextWrap.appendChild(span);
    setTimeout(() => {
      span.classList.add('pop');
      const waveOffset = (i * 0.18);
      span.style.animationDelay = (i * 0.08) + 's, ' + waveOffset + 's';
      span.style.animationDirection = 'normal, normal';
      span.style.animationIterationCount = '1, infinite';
      span.style.animationDuration = '0.6s, 1.4s';
    }, i * 80);
  });
}
function showCelebOverlay(){ buildCelebText(); celebOverlay.classList.add('show'); }
function hideCelebOverlay(){ celebOverlay.classList.remove('show'); celebTextWrap.innerHTML = ''; }

/* SPARKLES */
const sw = document.getElementById('sparklesWrap');
for(let i=0;i<15;i++){
  const s=document.createElement('div');s.className='sparkle';
  const sz=Math.random()*3+.8;
  Object.assign(s.style,{
    width:sz+'px',height:sz+'px',position:'fixed',
    top:Math.random()*65+'%',left:Math.random()*100+'%',zIndex:2,
    animationDelay:Math.random()*4+'s',animationDuration:1.8+Math.random()*2.5+'s'
  });
  sw.appendChild(s);
}

/* TOP GARLAND */
const gr=document.getElementById('garlandRow');
const gf=['🌸','🌼','🌺','🌻','🌸','🌼','🌺','🌻','🌸','🌼'];
gf.forEach((f,i)=>{
  const n=gf.length,drop=Math.sin(i/n*Math.PI)*38;
  const sp=document.createElement('span');sp.className='gfl';sp.textContent=f;
  sp.style.cssText=`margin-bottom:${drop}px;animation-duration:${2.4+Math.sin(i)*.8}s;animation-delay:${i*.08}s`;

/* BG CANVAS — RADIANT SUN */
const bgC=document.getElementById('bgCanvas');
const bgCtx=bgC.getContext('2d');
let W=bgC.width=window.innerWidth,H=bgC.height=window.innerHeight;
let sunPhase=0,sunY=H*.10,tSunY=sunY;
window.addEventListener('resize',()=>{W=bgC.width=window.innerWidth;H=bgC.height=window.innerHeight;});

function drawBg(){
  bgCtx.clearRect(0,0,W,H);
  sunPhase+=.006;
  sunY+=(tSunY-sunY)*.05;
  const sx=W/2;

  // Wide warm haze
  const haze=bgCtx.createRadialGradient(sx,sunY,0,sx,sunY,H*.65);
  haze.addColorStop(0,'rgba(255,255,190,.52)');
  haze.addColorStop(.35,'rgba(255,210,80,.18)');
  haze.addColorStop(.7,'rgba(255,150,30,.06)');
  haze.addColorStop(1,'transparent');
  bgCtx.fillStyle=haze;bgCtx.fillRect(0,0,W,H);

  // Sun corona
  const corona=bgCtx.createRadialGradient(sx,sunY,0,sx,sunY,155);
  corona.addColorStop(0,'rgba(255,255,200,.72)');
  corona.addColorStop(.2,'rgba(255,230,80,.28)');
  corona.addColorStop(.55,'rgba(255,160,40,.09)');
  corona.addColorStop(1,'transparent');
  bgCtx.fillStyle=corona;bgCtx.fillRect(0,0,W,H);

  // Sun body — bright & brilliant
  const sd=bgCtx.createRadialGradient(sx-10,sunY-10,0,sx,sunY,58);
  sd.addColorStop(0,'#FFFFFF');
  sd.addColorStop(.15,'#FFFCE0');
  sd.addColorStop(.45,'#FFE840');
  sd.addColorStop(.78,'#FFA820');
  sd.addColorStop(1,'#FF7010');
  bgCtx.fillStyle=sd;bgCtx.beginPath();bgCtx.arc(sx,sunY,58,0,Math.PI*2);bgCtx.fill();

  // Primary rays
  bgCtx.save();bgCtx.translate(sx,sunY);bgCtx.rotate(sunPhase*.65);
  for(let i=0;i<18;i++){
    const a=i*Math.PI/9,len=20+11*Math.sin(sunPhase*2.2+i);
    bgCtx.beginPath();bgCtx.moveTo(Math.cos(a)*63,Math.sin(a)*63);
    bgCtx.lineTo(Math.cos(a)*(86+len),Math.sin(a)*(86+len));
    bgCtx.strokeStyle=`rgba(255,215,50,${.30+.14*Math.sin(sunPhase*3+i)})`;
    bgCtx.lineWidth=2.8+Math.sin(sunPhase*2+i);bgCtx.lineCap='round';bgCtx.stroke();
  }
  // Secondary longer rays
  bgCtx.rotate(-sunPhase*.38);
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5+.3,len=32+14*Math.sin(sunPhase+i);
    bgCtx.beginPath();bgCtx.moveTo(Math.cos(a)*72,Math.sin(a)*72);
    bgCtx.lineTo(Math.cos(a)*(108+len),Math.sin(a)*(108+len));
    bgCtx.strokeStyle=`rgba(255,200,40,${.14+.07*Math.sin(sunPhase*2+i)})`;
    bgCtx.lineWidth=1.4;bgCtx.lineCap='round';bgCtx.stroke();
  }
  bgCtx.restore();
  requestAnimationFrame(drawBg);
}
drawBg();

/* PARALLAX */

/* PETAL CANVAS */
const pC=document.getElementById('petalCanvas');
const pCtx=pC.getContext('2d');
pC.width=W;pC.height=H;
window.addEventListener('resize',()=>{pC.width=W;pC.height=H;});
const PCOLS=['#FF6B1A','#FFB800','#FF4500','#FFE082','#FF8C00','#E53935','#FF69B4','#4CAF50','#FFD700','#FF5252','#FFEB3B','#FF7043','#E91E63','#8BC34A'];
const petals=[];
function mkPetal(x,y,burst){
  for(let k=0;k<(burst?14:1);k++){
    const a=burst?Math.random()*Math.PI*2:Math.random()*.5-.25;
    const sp=burst?2+Math.random()*6:.5+Math.random()*1.4;
    petals.push({
      x:x??Math.random()*W,y:y??-(Math.random()*60),
      vx:Math.cos(a)*sp*(burst?1:.4),vy:Math.sin(a)*sp+(burst?0:.65),
      rot:Math.random()*360,vrot:(Math.random()-.5)*5,
      sz:7+Math.random()*9,col:PCOLS[Math.floor(Math.random()*PCOLS.length)],
      op:.85+Math.random()*.15,burst,life:1,decay:burst?.013:0
    });
  }
}
for(let i=0;i<20;i++) mkPetal(null,null,false);
function drawPetals(){
  pCtx.clearRect(0,0,pC.width,pC.height);
  for(let i=petals.length-1;i>=0;i--){
    const p=petals[i];
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;
    if(p.burst){p.life-=p.decay;if(p.life<=0){petals.splice(i,1);continue;}}
    if(p.y>pC.height+20){if(!p.burst){p.y=-20;p.x=Math.random()*pC.width;}else{petals.splice(i,1);continue;}}
    pCtx.save();pCtx.translate(p.x,p.y);pCtx.rotate(p.rot*Math.PI/180);
    pCtx.globalAlpha=p.burst?p.life*p.op:p.op;pCtx.fillStyle=p.col;
    pCtx.beginPath();pCtx.moveTo(0,-p.sz);
    pCtx.bezierCurveTo(p.sz*.9,-p.sz*.5,p.sz*.9,p.sz*.5,0,p.sz);
    pCtx.bezierCurveTo(-p.sz*.9,p.sz*.5,-p.sz*.9,-p.sz*.5,0,-p.sz);
    pCtx.fill();pCtx.restore();
  }
  if(Math.random()<.03) mkPetal(null,null,false);
  requestAnimationFrame(drawPetals);
}
drawPetals();

/* RANGOLI */
const rC=document.getElementById('rangoliC');
const rCtx=rC.getContext('2d');
let rLit=false,rAnim=null;
function drawRangoli(lit){
  const CW=300,CH=130,cx=CW/2,cy=CH/2;
  rCtx.clearRect(0,0,CW,CH);
  if(lit){
    const g=rCtx.createRadialGradient(cx,cy,0,cx,cy,95);
    g.addColorStop(0,'rgba(255,215,0,.52)');g.addColorStop(1,'transparent');
    rCtx.fillStyle=g;rCtx.fillRect(0,0,CW,CH);
  }
  const a=lit?1:.72;
  for(let i=0;i<8;i++){
    rCtx.save();rCtx.translate(cx,cy);rCtx.rotate(i*Math.PI/4);
    rCtx.beginPath();rCtx.ellipse(0,-40,10,22,0,0,Math.PI*2);
    rCtx.fillStyle=i%2?'#F5A800':'#E8621A';rCtx.globalAlpha=a;rCtx.fill();rCtx.restore();
  }
  for(let i=0;i<8;i++){
    rCtx.save();rCtx.translate(cx,cy);rCtx.rotate(i*Math.PI/4+Math.PI/8);
    rCtx.beginPath();rCtx.ellipse(0,-25,6,13,0,0,Math.PI*2);
    rCtx.fillStyle='#2E7D32';rCtx.globalAlpha=a*.9;rCtx.fill();rCtx.restore();
  }
  for(let i=0;i<16;i++){
    const ang=i*Math.PI/8,r=58;
    rCtx.beginPath();rCtx.arc(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r,3.5,0,Math.PI*2);
    rCtx.fillStyle=i%2?'#F5A800':'#E8621A';rCtx.globalAlpha=a*.85;rCtx.fill();
  }
  rCtx.beginPath();rCtx.arc(cx,cy,14,0,Math.PI*2);rCtx.fillStyle='#F5A800';rCtx.globalAlpha=a;rCtx.fill();
  rCtx.beginPath();rCtx.arc(cx,cy,9,0,Math.PI*2);rCtx.fillStyle='#E8621A';rCtx.fill();
  rCtx.beginPath();rCtx.arc(cx,cy,4,0,Math.PI*2);rCtx.fillStyle='#FFF8DC';rCtx.globalAlpha=1;rCtx.fill();
  [[38,cy],[262,cy]].forEach(([x,y])=>{
    rCtx.beginPath();rCtx.arc(x,y,8,0,Math.PI*2);rCtx.fillStyle='#F5A800';rCtx.globalAlpha=a*.8;rCtx.fill();
    rCtx.beginPath();rCtx.arc(x,y,4,0,Math.PI*2);rCtx.fillStyle='#E8621A';rCtx.fill();
  });
  rCtx.globalAlpha=1;
}
drawRangoli(false);
rC.addEventListener('click',()=>{
  rLit=!rLit;drawRangoli(rLit);
  if(rLit){
    showToast('🌸 Rangoli glowing — prosperity is welcome!');
    mkPetal(rC.getBoundingClientRect().left+150,rC.getBoundingClientRect().top+65,true);
    clearInterval(rAnim);let ph=0;
    rAnim=setInterval(()=>{
      ph+=.06;drawRangoli(true);
      const g=rCtx.createRadialGradient(150,65,0,150,65,85);
      g.addColorStop(0,`rgba(255,220,0,${.14+.09*Math.sin(ph)})`);g.addColorStop(1,'transparent');
      rCtx.fillStyle=g;rCtx.fillRect(0,0,300,130);
    },40);
  } else {clearInterval(rAnim);drawRangoli(false);}
});

/* FIREWORKS */
const fwC=document.getElementById('fwCanvas');
const fwCtx=fwC.getContext('2d');
fwC.width=W;fwC.height=H;
window.addEventListener('resize',()=>{fwC.width=W;fwC.height=H;});
const FW_COLS=['#FFD700','#FF6B1A','#FF4500','#FFE082','#FF69B4','#00E5FF','#69F0AE','#FF1744','#FFFF00','#E040FB','#FFFFFF','#FF8A65','#FF5722','#CDDC39'];
let fwPts=[],fwRunning=false;

function launchFW(cx,cy){
  const c1=FW_COLS[Math.floor(Math.random()*FW_COLS.length)];
  const c2=FW_COLS[Math.floor(Math.random()*FW_COLS.length)];
  const n=90+Math.floor(Math.random()*55);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*7;
    fwPts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,decay:.011+Math.random()*.020,sz:1.5+Math.random()*3.5,
      col:Math.random()<.55?c1:c2,trail:[],sparkle:Math.random()<.28,grav:.055+Math.random()*.04});
  }
}
function fwLoop(){
  if(!fwRunning&&fwPts.length===0){fwCtx.clearRect(0,0,fwC.width,fwC.height);return;}
  fwCtx.fillStyle='rgba(255,240,160,.08)';fwCtx.fillRect(0,0,fwC.width,fwC.height);
  fwPts=fwPts.filter(p=>p.life>0);
  fwPts.forEach(p=>{
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>9)p.trail.shift();
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.97;p.vy*=.97;p.life-=p.decay;
    p.trail.forEach((t,ti)=>{
      fwCtx.beginPath();fwCtx.arc(t.x,t.y,p.sz*(ti/p.trail.length)*.7,0,Math.PI*2);
      fwCtx.fillStyle=p.col;fwCtx.globalAlpha=p.life*(ti/p.trail.length)*.5;fwCtx.fill();
    });
    const fl=p.sparkle&&Math.random()<.18;
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,fl?p.sz*2.2:p.sz,0,Math.PI*2);
    fwCtx.fillStyle=fl?'#FFFFFF':p.col;fwCtx.globalAlpha=p.life*(fl?.5:1);fwCtx.fill();fwCtx.globalAlpha=1;
  });
  requestAnimationFrame(fwLoop);
}

const flashEl=document.getElementById('flash');
let celebLock=false;
document.getElementById('celebBtn').addEventListener('click',()=>{

const toastEl=document.getElementById('toast');
let toastT=null;
function showToast(msg){
  clearTimeout(toastT);toastEl.textContent=msg;toastEl.classList.add('show');

}
